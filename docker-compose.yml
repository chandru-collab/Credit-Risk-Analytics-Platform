# ─────────────────────────────────────────────────────────────
#  Docker Compose — Credit Risk Analytics Platform
# ─────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── FastAPI Backend ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: credit_risk_backend
    ports:
      - "8000:8000"
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80,http://frontend
      - DEFAULT_DATASET_PATH=credit_data.csv
      - DEFAULT_MODEL=Random Forest
    volumes:
      - ./backend/credit_data.csv:/app/credit_data.csv:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── React Frontend (Nginx) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: credit_risk_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: credit_risk_network
